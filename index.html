<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Real Estate | Audit Systémique</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&family=Inter:wght@300;400;500;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #020617 0%, #0a0f24 50%, #17113a 100%); 
            color: white; 
            /* On empêche le body de scroller, c'est #app qui gère le scroll */
            overflow: hidden; 
        }
        .font-title { font-family: 'Montserrat', sans-serif; }
        
        .text-gradient-platinum {
            background: linear-gradient(to bottom, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-enter { animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        .input-quantum {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            transition: all 0.3s ease;
        }
        .input-quantum:focus {
            border-color: #60a5fa;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.2);
            outline: none;
        }

        .glitch-text { color: #ef4444; font-weight: 900; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }

        /* SCROLLBAR PREMIUM QUANTUM */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.8);
        }
    </style>
</head>
<body class="w-full h-screen flex flex-col relative bg-gradient-to-br from-[#020617] via-[#0a0f24] to-[#17113a]">

    <div class="absolute top-8 left-8 z-50 animate-enter pointer-events-none">
        <img src="https://i.ibb.co/C3KXLBJM/Quantum-1.png" alt="Quantum" class="h-20 md:h-32 object-contain drop-shadow-[0_0_20px_rgba(255,255,255,0.15)]">
    </div>

    <!-- Conteneur principal avec scrollbar custom -->
    <div id="app" class="w-full h-full relative z-10 overflow-y-auto custom-scrollbar"></div>

    <div id="nav-footer" class="hidden fixed bottom-0 left-0 w-full p-6 z-50 bg-[#020617]/95 border-t border-white/5 flex justify-between items-center backdrop-blur-xl">
        <div id="counter" class="font-title text-xl text-white w-28">01 <span class="text-gray-600 text-sm">/ 14</span></div>
        <div class="flex gap-4">
            <button onclick="navigate(-1)" class="p-4 border border-white/10 hover:bg-white/5 text-white rounded-full transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            <button id="btn-next" onclick="navigate(1)" class="px-8 py-4 bg-white text-black font-black hover:scale-105 transition-all rounded-full flex items-center gap-3 shadow-[0_0_20px_rgba(255,255,255,0.2)]">SUIVANT <i data-lucide="arrow-right" class="w-5 h-5"></i></button>
        </div>
        <div class="absolute top-0 left-0 h-[2px] bg-blue-500 transition-all duration-300" id="progress-bar" style="width: 0%"></div>
    </div>

    <script>
        const MARKET_DB = {
            'FR': {
                'paris': { rival: 'ULYS Immobilier', fol: '28k+', loss: '185 000', market: '12.5B', gain: '1.5M', traffic_gap: '-75%', pos_gap: '12 vs 1' },
                'default': { rival: 'Réseaux Mandataires', fol: '12k', loss: '75 000', market: '1.2B', gain: '500k', traffic_gap: '-60%', pos_gap: '8 vs 2' },
                currency: '€'
            },
            'CA': {
                'montreal': { rival: 'McGill Immobilier', fol: '35k+', loss: '145 000', market: '28B', gain: '1.2M', traffic_gap: '-86%', pos_gap: '8 vs 1' },
                'default': { rival: 'Top Agency', fol: '25k', loss: '95 000', market: '12B', gain: '850k', traffic_gap: '-70%', pos_gap: '5 vs 1' },
                currency: '$'
            }
        };

        let STATE = { step: 0, country: '', geo: { l1: '', l2: '', l3: '' }, name: '', followers: '', claim_share: '', data: {} };
        let currentIndex = 0;
        let slides = [];
        let analysisDate = null;

        // Fonction d'encapsulation pour centrer le contenu tout en permettant le scroll s'il est trop grand
        function wrapContent(htmlContent) {
            return `<div class="min-h-full w-full flex flex-col items-center justify-center py-32 md:py-40 px-4 md:px-8 pb-32">
                        ${htmlContent}
                    </div>`;
        }

        function renderCountrySelect() {
            const app = document.getElementById('app');
            const html = `
                <div class="glass-panel p-16 max-w-5xl w-full text-center animate-enter rounded-3xl relative">
                    <h2 class="text-5xl md:text-7xl font-title text-white mb-4 uppercase tracking-tighter">AUDIT <span class="text-gradient-platinum">QUANTUM</span></h2>
                    <p class="text-xs text-blue-400 uppercase tracking-[0.4em] mb-16 font-bold">Diagnostic financier & Asymétrie de marché</p>
                    <div class="grid md:grid-cols-2 gap-8">
                        <button onclick="selectCountry('FR')" class="group p-10 border border-white/10 hover:border-blue-500/50 bg-white/5 hover:bg-blue-900/20 transition-all rounded-2xl flex flex-col items-center">
                            <div class="text-6xl mb-4 group-hover:scale-110 transition-transform">🇫🇷</div>
                            <div class="font-title text-2xl text-white mb-1 tracking-widest">FRANCE</div>
                        </button>
                        <button onclick="selectCountry('CA')" class="group p-10 border border-white/10 hover:border-blue-500/50 bg-white/5 hover:bg-blue-900/20 transition-all rounded-2xl flex flex-col items-center">
                            <div class="text-6xl mb-4 group-hover:scale-110 transition-transform">🇨🇦</div>
                            <div class="font-title text-2xl text-white mb-1 tracking-widest">CANADA</div>
                        </button>
                    </div>
                </div>`;
            app.innerHTML = wrapContent(html);
        }

        function selectCountry(code) { STATE.country = code; renderDetailsForm(); }

        function renderDetailsForm() {
            const isFr = STATE.country === 'FR';
            const labels = isFr ? {l2: "Ville", l3: "Quartier (Micro-marché)"} : {l2: "Ville", l3: "Secteur (ex: Griffintown)"};
            
            const html = `
                <div class="glass-panel p-10 max-w-4xl w-full animate-enter rounded-3xl border-t border-white/20">
                    <h2 class="text-4xl font-title mb-8 uppercase text-white tracking-tight border-b border-white/10 pb-6">PARAMÈTRES <span class="text-blue-400">D'AUDIT</span></h2>
                    <div class="grid grid-cols-2 gap-8 mb-8">
                        <div><label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block tracking-wider">Cible (Nom Agence / Courtier)</label><input id="inp-name" class="input-quantum w-full p-4 rounded-xl text-lg font-bold" placeholder="ex: Elite Immobilier"></div>
                        <div><label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block tracking-wider">Claim Part de Marché (Interne)</label><input id="inp-claim" class="input-quantum w-full p-4 rounded-xl text-lg" placeholder="ex: 25%"></div>
                        <div><label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block tracking-wider">${labels.l2}</label><input id="inp-l2" class="input-quantum w-full p-4 rounded-xl" placeholder="${isFr ? 'Paris' : 'Montréal'}"></div>
                        <div><label class="text-[10px] text-gray-400 uppercase font-bold mb-2 block tracking-wider">${labels.l3}</label><input id="inp-l3" class="input-quantum w-full p-4 rounded-xl" placeholder="${isFr ? 'Le Marais' : 'Griffintown'}"></div>
                    </div>
                    <button onclick="runAnalysis()" class="w-full bg-white text-black hover:bg-gray-200 font-black text-xl py-5 rounded-xl uppercase tracking-widest transition-all shadow-[0_0_30px_rgba(255,255,255,0.15)]">LANCER LE DIAGNOSTIC NI 200.15</button>
                </div>`;
            document.getElementById('app').innerHTML = wrapContent(html);
            lucide.createIcons();
        }

        function runAnalysis() {
            STATE.name = document.getElementById('inp-name').value || "Agence Auditée";
            STATE.claim_share = document.getElementById('inp-claim').value || "25%";
            STATE.geo.l2 = document.getElementById('inp-l2').value || (STATE.country === 'FR' ? "Paris" : "Montréal");
            STATE.geo.l3 = document.getElementById('inp-l3').value || (STATE.country === 'FR' ? "Le Marais" : "Griffintown");
            
            const cityKey = STATE.geo.l2.toLowerCase().trim();
            const countryDB = MARKET_DB[STATE.country];
            STATE.data = countryDB[cityKey] || countryDB['default'];
            STATE.data.curr = countryDB.currency;
            analysisDate = new Date(); 

            const app = document.getElementById('app');
            const html = `
                <div class="text-center max-w-2xl mx-auto px-6 animate-enter">
                    <div class="w-24 h-24 border-2 border-gray-800 border-t-blue-500 rounded-full animate-spin mx-auto mb-10 shadow-[0_0_30px_rgba(59,130,246,0.3)]"></div>
                    <h2 class="text-2xl font-title text-white mb-6 tracking-[0.2em] uppercase">VÉRIFICATION CROISÉE : <span class="text-blue-400">${STATE.geo.l3.toUpperCase()}</span></h2>
                    <div class="w-full bg-black/50 rounded-full h-1 mb-4 border border-white/10"><div id="load-bar" class="h-full bg-blue-500 shadow-[0_0_15px_#3b82f6] transition-all" style="width:0%"></div></div>
                    <p class="font-mono text-xs text-gray-500 tracking-wider text-left pl-4" id="load-log">> Init NI 200.15...</p>
                </div>`;
            app.innerHTML = wrapContent(html);

            let progress = 0;
            const logs = [
                `> Extraction Centris/MLS position...`,
                `> Analyse de trafic SimilarWeb vs ${STATE.data.rival}...`,
                `> Scraping avis & NPS client mystère...`,
                `> Calcul de discrépance et perte financière...`,
                `> Compilation preuve irréfutable.`
            ];
            
            const timer = setInterval(() => {
                progress += 2;
                document.getElementById('load-bar').style.width = progress + '%';
                if(progress % 20 === 0 && logs[(progress/20)-1]) document.getElementById('load-log').innerText = logs[(progress/20)-1];
                if(progress >= 100) { clearInterval(timer); buildSlides(); showPresentation(); }
            }, 35);
        }

        function buildSlides() {
            slides = [
                { type: 'cover', title: "", subtitle: "", tag: "CONFIDENTIEL" },
                { type: 'scepticisme', title: "VÉRITÉ BRUTALE", subtitle: "MÉTHODOLOGIE : SCEPTICISME PROFESSIONNEL (3 SOURCES)", insight: "Conclusion de l'auditeur : Surévaluation systémique de la position concurrentielle." },
                { type: 'calculator', title: "HÉMORRAGIE FINANCIÈRE", subtitle: "SIMULEZ VOTRE PERTE FACE AU LEADER", base_commission: 15000, desc: "Ajustez votre volume de transactions annuel visé :" },
                { type: 'menace', title: "LA MENACE", subtitle: "DOMINATION ALGORITHMIQUE", rival: "", rival_stat: "70%", rival_desc: "", urgency: "" },
                { type: 'cards-freins', title: "VOS 3 FREINS", subtitle: "POURQUOI LA PERTE S'ACCÉLÈRE", items: [{num: "01", title: "TEMPS", desc: "Le montage vidéo pro est un job à temps plein. L'amateurisme détruit le Brand Equity."}, {num: "02", title: "CRÉDIBILITÉ", desc: "Peur du ridicule face à des concurrents qui déploient une qualité type Netflix."}, {num: "03", title: "ROI BIAISÉ", desc: "Acquisition de 'likes' au lieu de signatures de mandats qualifiés."}] },
                { type: 'diagnostic', title: "AUTO-DIAGNOSTIC", subtitle: "QUEL EST VOTRE GOULOT D'ÉTRANGLEMENT ACTUEL ?", selected: null },
                { type: 'checklist', title: "MÉTHODE QUANTUM", subtitle: "SYSTÈME D'ACQUISITION (4 PILIERS)", items: ["PRODUCTION CINÉMA (Nous gérons 100%, qualité Netflix)", "SCRIPTS NEURO-MARKETING (Vente invisible et autorité)", "DIFFUSION GÉO-CIBLÉE", "CONVERSION IA 24/7 (Qualification automatique)"] },
                { type: 'metrics', title: "PROJECTIONS DATA", subtitle: "BASÉ SUR MODÈLE MRB/MRN", items: [{val: "+400%", label: "Visibilité Locale", sub: "Dès J+30"}, {val: "15+", label: "Leads Qualifiés", sub: "Par mois"}, {val: "x10", label: "ROI Autofinancé", sub: "Dès le 1er mandat"}] },
                { type: 'roadmap', title: "ROADMAP 90 JOURS", subtitle: "DÉPLOIEMENT SYSTÉMIQUE" },
                { type: 'funnel', title: "ENTONNOIR DE DOMINATION", roi: "" },
                { type: 'faq', title: "OBJECTIONS COMMUNES", qa: [{q: "Je n'ai pas le temps pour les tournages", a: "L'équipe Quantum gère 100%. Votre implication : 15 min/semaine pour validation."}, {q: "Et si l'image fait 'cheap' ?", a: "Nous utilisons du matériel de production Cinéma. L'objectif est d'augmenter votre Brand Equity (+20% perception prix)."}, {q: "Je veux du ROI, pas des vues", a: "Notre IA filtre les curieux. Seuls les prospects qualifiés atterrissent dans votre CRM."}] },
                { type: 'guarantee', title: "RISQUE ZÉRO", subtitle: "PHASE 1 (30 JOURS)", offer: ["Audit concurrentiel complet (Livrable PDF)", "6 FILMS NETFLIX qui raflent les commissions", "Système IA de qualification intégré au CRM"], text: "SATISFAIT OU REMBOURSÉ 100%" },
                { type: 'proof', title: "RÉSULTATS PROUVÉS", subtitle: "ÉTUDES DE CAS & BENCHMARKS", items: [{stat: "+900%", label: "LEADS", desc: "Passé de 2 à 18 mandats/mois - Pierre L."}, {stat: "450K", label: "IMPRESSIONS", desc: "Domination algorithmique ciblée sur 1 quartier"}, {stat: "-55%", label: "TAUX REBOND", desc: "Trafic converti via refonte UX/Vidéo"}] },
                { type: 'cta', title: "DÉCISION", choiceA: {title: "STATU QUO", price: ""}, choiceB: {title: "MÉTHODE QUANTUM", price: ""} },
                { type: 'final', title: "ACTION", subtitle: "Documentation vérifiée. Le marché ne vous attendra pas." }
            ];
        }

        function personalizeSlides() {
            if(!STATE.data || !slides.length) return;
            const D = STATE.data;
            const q = STATE.geo.l3.toUpperCase();
            const loc = STATE.geo.l2.toUpperCase();

            slides[0].title = `DOMINATION ${loc} 2026`;
            slides[0].subtitle = `AUDIT MARQUE : ${STATE.name.toUpperCase()} (${q})`;

            slides[1].loc = q;
            slides[1].claim = STATE.claim_share;
            slides[1].rival = D.rival;
            slides[1].traffic = D.traffic_gap;
            slides[1].pos = D.pos_gap;

            slides[2].base_commission = STATE.country === 'FR' ? 12000 : 18000;
            slides[2].curr = D.curr;

            slides[3].rival = D.rival;
            slides[3].rival_desc = `${D.rival} raflera 70% du marché NEUF sur ${q} grâce à une omniprésence digitale.`;
            slides[13].choiceA.price = `PERTE ACTUELLE : ${D.loss}${D.curr}/AN`;
            slides[13].choiceB.price = `GAIN BRAND EQUITY : ${D.gain}${D.curr}`;
        }

        window.updateCalculator = function(val) {
            STATE.calc_volume = val;
            const slide = slides.find(s => s.type === 'calculator');
            const lossRate = 0.65;
            const totalLost = Math.floor(val * slide.base_commission * lossRate);
            
            document.getElementById('calc-vol-display').innerText = val;
            document.getElementById('calc-loss-display').innerText = new Intl.NumberFormat('fr-FR').format(totalLost) + slide.curr;
            
            const warningEl = document.getElementById('calc-warning');
            if (val > 20) {
                warningEl.innerHTML = `<span class="text-red-500 glitch-text">ALERTE CRITIQUE : Vous financez l'expansion de vos concurrents.</span>`;
            } else {
                warningEl.innerHTML = `Ce capital est absorbé par ceux qui maîtrisent l'attention.`;
            }
        };

        window.selectDiagnostic = function(choice) {
            STATE.diagnostic = choice;
            document.querySelectorAll('.diag-btn').forEach(b => {
                b.classList.remove('border-blue-500', 'bg-blue-900/40');
                b.classList.add('border-white/10', 'bg-white/5');
            });
            const activeBtn = document.getElementById(`diag-${choice}`);
            activeBtn.classList.remove('border-white/10', 'bg-white/5');
            activeBtn.classList.add('border-blue-500', 'bg-blue-900/40', 'shadow-[0_0_20px_rgba(59,130,246,0.3)]');
            setTimeout(() => navigate(1), 400);
        };

        function generateQuantumLink() {
            const p = new URLSearchParams({ 
                nom: STATE.name, 
                ville: STATE.geo.l2, 
                quartier: STATE.geo.l3, 
                perte: STATE.data.loss, 
                country: STATE.country,
                volume_vise: STATE.calc_volume || 10,
                probleme: STATE.diagnostic || 'Non spécifié'
            });
            return `https://calendar.app.google/5KtGeK5ZYzBQ3kyZ9?${p.toString()}`;
        }

        function addCountdown() {
            if(!analysisDate) return 90;
            const remaining = Math.max(0, 90 - Math.floor((new Date() - analysisDate) / 86400000));
            if(slides[3]) slides[3].urgency = `Fenêtre d'action : ${remaining} jours avant saturation complète du marché.`;
            if(slides[12]) slides[12].urgency = `⏳ ${remaining} JOURS RESTANTS - 3 CRÉNEAUX AUDIT CETTE SEMAINE`;
            if(slides[13]) slides[13].urgency = `${remaining} JOURS RESTANTS - 3 PLACES CETTE SEMAINE`;
        }

        function showPresentation() { document.getElementById('nav-footer').classList.remove('hidden'); renderSlide(); }

        function renderSlide() {
            personalizeSlides();
            addCountdown();

            if(currentIndex >= slides.length) currentIndex = 0;
            if(currentIndex < 0) currentIndex = slides.length - 1;
            const s = slides[currentIndex];
            const app = document.getElementById('app');
            let html = '';

            const quantumLink = generateQuantumLink();

            if(s.type === 'cover') {
                html = `<div class="text-center animate-enter px-6 max-w-5xl w-full"><div class="inline-block border border-red-500/30 px-6 py-2 text-xs text-red-400 font-bold tracking-[0.3em] uppercase mb-12 bg-red-900/10 rounded-full">${s.tag}</div><h1 class="text-5xl md:text-8xl font-title text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500 mb-6 leading-none uppercase drop-shadow-2xl">${s.title}</h1><div class="h-[1px] w-40 bg-blue-500 mx-auto mb-8"></div><p class="text-xl md:text-2xl text-gray-300 font-light max-w-2xl mx-auto tracking-widest uppercase font-title">${s.subtitle}</p></div>`;
            }
            else if(s.type === 'calculator') {
                html = `<div class="w-full max-w-5xl px-6 animate-enter text-center">
                    <h2 class="text-4xl md:text-5xl font-title text-white mb-2 uppercase">${s.title}</h2>
                    <p class="text-[10px] tracking-[0.3em] text-red-400 mb-12 uppercase font-bold">${s.subtitle}</p>
                    
                    <div class="glass-panel p-10 rounded-2xl border border-red-500/30 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-900 to-red-500"></div>
                        <p class="text-gray-400 text-sm tracking-widest uppercase mb-8">${s.desc}</p>
                        
                        <div class="flex items-center gap-6 mb-10">
                            <span class="text-xl font-bold text-gray-500">5</span>
                            <input type="range" min="5" max="50" value="10" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-red-500" oninput="updateCalculator(this.value)">
                            <span class="text-xl font-bold text-gray-500">50+</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-8 border-t border-white/10 pt-8">
                            <div>
                                <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold mb-2">Volume sélectionné</p>
                                <p class="text-4xl font-title text-white"><span id="calc-vol-display">10</span> <span class="text-lg text-gray-400">Transactions</span></p>
                            </div>
                            <div class="border-l border-white/10 pl-8 relative">
                                <p class="text-[10px] text-red-400 uppercase tracking-widest font-black mb-2">Manque à gagner estimé (-65%)</p>
                                <p class="text-5xl md:text-6xl font-title font-black text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.3)]" id="calc-loss-display">--</p>
                            </div>
                        </div>
                    </div>
                    <p class="text-sm text-gray-500 mt-8 italic font-light h-6 transition-all" id="calc-warning">Ajustez le curseur pour voir l'impact de l'asymétrie digitale.</p>
                </div>`;
                setTimeout(() => updateCalculator(10), 50);
            }
            else if(s.type === 'diagnostic') {
                html = `<div class="w-full max-w-5xl px-6 animate-enter text-center">
                    <h2 class="text-4xl md:text-5xl font-title text-white mb-4 uppercase">${s.title}</h2>
                    <p class="text-xs tracking-[0.3em] text-blue-400 mb-12 uppercase font-bold">${s.subtitle}</p>
                    <div class="grid md:grid-cols-3 gap-6">
                        <button id="diag-visibilite" onclick="selectDiagnostic('visibilite')" class="diag-btn p-8 rounded-xl border border-white/10 bg-white/5 hover:border-blue-400 transition-all text-left group">
                            <i data-lucide="eye" class="w-8 h-8 text-gray-400 group-hover:text-blue-400 mb-4 transition-colors"></i>
                            <h3 class="text-xl font-title text-white font-bold mb-2 uppercase">Visibilité Nulle</h3>
                            <p class="text-xs text-gray-400 leading-relaxed">Personne ne me connaît sur mon secteur. Le concurrent prend tout le trafic.</p>
                        </button>
                        <button id="diag-conversion" onclick="selectDiagnostic('conversion')" class="diag-btn p-8 rounded-xl border border-white/10 bg-white/5 hover:border-blue-400 transition-all text-left group">
                            <i data-lucide="filter" class="w-8 h-8 text-gray-400 group-hover:text-blue-400 mb-4 transition-colors"></i>
                            <h3 class="text-xl font-title text-white font-bold mb-2 uppercase">Acquisition Biaisée</h3>
                            <p class="text-xs text-gray-400 leading-relaxed">J'ai des vues ou des clics, mais ça ne se transforme jamais en rendez-vous vendeurs.</p>
                        </button>
                        <button id="diag-temps" onclick="selectDiagnostic('temps')" class="diag-btn p-8 rounded-xl border border-white/10 bg-white/5 hover:border-blue-400 transition-all text-left group">
                            <i data-lucide="clock" class="w-8 h-8 text-gray-400 group-hover:text-blue-400 mb-4 transition-colors"></i>
                            <h3 class="text-xl font-title text-white font-bold mb-2 uppercase">Bande Passante</h3>
                            <p class="text-xs text-gray-400 leading-relaxed">Je passe mon temps à prospecter manuellement. Impossible de créer du contenu pro.</p>
                        </button>
                    </div>
                </div>`;
            }
            else if(s.type === 'scepticisme') {
